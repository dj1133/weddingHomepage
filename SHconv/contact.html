<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>선학컨벤션 Contact | Dreams Wedding</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body class="detail-page SHconv-page">
    <header class="page-header">
      <a class="brand" href="../index.html">Dreams Wedding</a>
      <a class="back-link" href="../index.html">All Halls</a>
    </header>
    <nav class="detail-menu" aria-label="선학컨벤션 information menu">
      <a href="./">소개</a>
      <a href="contact.html" aria-current="page">연락처</a>
      <a href="hall.html">웨딩홀</a>
      <a href="photo.html">Photo</a>
      <a href="map.html">약도</a>
      <a href="details.html">기타 정보</a>
    </nav>
    <main class="info-page-main">
      <section class="detail-content single-info" aria-label="선학컨벤션 contact">
        <article class="info-block">
          <span class="section-label dark-label">Contact</span>
          <h1>선학컨벤션 연락처</h1>
          <p>야간 조명 리허설, LED 버진로드, 애프터 리셉션을 중심으로 예식 큐시트와 촬영 동선을 함께 안내합니다.</p>
        </article>
        <article class="info-card">
          <h2>상담 안내</h2>
          <dl class="info-list">
            <div><dt>예약 상담</dt><dd>02-555-1205</dd></div>
            <div><dt>이메일</dt><dd>SHconv@Dreamswedding.kr</dd></div>
            <div><dt>상담 시간</dt><dd>매일 10:00 - 19:00</dd></div>
          </dl>
        </article>
      </section>
      <section class="detail-content inquiry-section" aria-label="선학컨벤션 inquiry form">
        <form class="inquiry-form" data-venue-name="선학컨벤션" data-venue-email="SHconv@Dreamswedding.kr">
          <div class="form-heading">
            <span class="section-label dark-label">Inquiry</span>
            <h2>상담 신청</h2>
            <p>남겨주신 내용을 선학컨벤션 담당자에게 보낼 수 있도록 메일 작성창을 준비합니다.</p>
          </div>
          <div class="form-grid">
            <label>신랑 성함<input type="text" name="groomName" autocomplete="name" required></label>
            <label>신랑 연락처<input type="tel" name="groomPhone" autocomplete="tel" required></label>
            <label>신부 성함<input type="text" name="brideName" autocomplete="name" required></label>
            <label>신부 연락처<input type="tel" name="bridePhone" autocomplete="tel" required></label>
            <label>회신 이메일<input type="email" name="replyEmail" autocomplete="email" required></label>
            <label>예상 하객수<input type="number" name="guestCount" min="1" step="1" required></label>
            <label>원하는 웨딩홀<select name="desiredHall" required><option value="호텔동방">호텔동방</option><option value="제이스퀘어호텔">제이스퀘어호텔</option><option value="M컨벤션">M컨벤션</option><option value="더리움">더리움</option><option value="선학컨벤션" selected>선학컨벤션</option></select></label>
          </div>
          <div class="date-group">
            <div class="date-group-head">
              <span>결혼식 희망 날짜</span>
              <button type="button" class="ghost-button add-date">날짜 추가</button>
            </div>
            <label>1순위 날짜<input type="date" name="weddingDate" required></label>
            <div class="extra-dates"></div>
          </div>
          <label class="full-field">문의사항<textarea name="message" rows="6" required></textarea></label>
          <button type="submit" class="cta submit-inquiry">이메일로 문의 보내기</button>
          <p class="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="../assets/contact-form.js"></script>
  </body>
</html>
