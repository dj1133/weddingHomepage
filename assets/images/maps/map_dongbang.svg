<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 50 1000 750" role="img" aria-labelledby="title desc">
  <title id="title">호텔동방 약도</title>
  <desc id="desc">진주시외버스터미널 동쪽 약 400미터, 남강 북안에서 논개길과 남강로 사이에 있는 호텔동방 위치 안내 약도</desc>
  <defs>
    <style>
      text {
        font-family: "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
        fill: #303030;
        letter-spacing: 0;
      }
      .road-name {
        font-size: 36px;
        font-weight: 700;
        fill: #626262;
      }
      .place-name {
        font-size: 36px;
        font-weight: 700;
      }
      .minor-label {
        font-size: 32px;
        font-weight: 600;
        fill: #6b6b6b;
      }
      .hotel-name {
        font-size: 40px;
        font-weight: 800;
        fill: #ffffff;
      }
    </style>
    <filter id="hotel-shadow" x="-20%" y="-25%" width="145%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#383838" flood-opacity=".24"/>
    </filter>
    <marker id="route-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#454545"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#f5f5f5"/>

  <!-- 남강과 북안의 강변 녹지 -->
  <path d="M0 650C270 606 530 598 790 624C955 641 1080 674 1200 724V900H0Z" fill="#c8c8c8"/>
  <path d="M0 618C270 574 535 566 798 592C968 609 1090 641 1200 686V724C1080 674 955 641 790 624C530 598 270 606 0 650Z" fill="#e3e3e3"/>

  <!-- 선학산 서쪽 기슭 -->
  <path d="M990 0H1200V900H1155C1122 780 1088 690 1028 612C958 522 944 447 956 360C968 269 1010 174 990 0Z" fill="#e2e2e2"/>
  <path d="M1052 92C1018 196 998 292 1004 380C1010 465 1047 539 1112 610" fill="none" stroke="#bdbdbd" stroke-width="5" stroke-dasharray="12 14"/>

  <!-- 주변 건물 블록 -->
  <g fill="#e9e9e9" stroke="#d5d5d5" stroke-width="3">
    <path d="M52 62H358V152H52Z"/>
    <path d="M770 62H930V162H770Z"/>
    <path d="M52 205H278V320H52Z"/>
    <path d="M305 205H405V320H305Z"/>
    <path d="M770 204H930V322H770Z"/>
    <path d="M52 430H248V512H52Z"/>
    <path d="M278 424H470V516H278Z"/>
    <path d="M500 426H638V522H500Z"/>
  </g>

  <!-- 남강 북안 도로: 남강로, 논개길 -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 560C280 528 545 516 782 546C946 566 1074 610 1200 664" stroke="#d0d0d0" stroke-width="108"/>
    <path d="M0 560C280 528 545 516 782 546C946 566 1074 610 1200 664" stroke="#ffffff" stroke-width="98"/>

    <path d="M0 370C258 355 492 350 676 366C804 377 891 421 965 497C1019 552 1085 612 1200 664" stroke="#d7d7d7" stroke-width="82"/>
    <path d="M0 370C258 355 492 350 676 366C804 377 891 421 965 497C1019 552 1085 612 1200 664" stroke="#ffffff" stroke-width="72"/>
  </g>

  <!-- 시외버스터미널 주변 진입도로 -->
  <g fill="none" stroke-linecap="round">
    <path d="M596 0V328" stroke="#dadada" stroke-width="48"/>
    <path d="M596 0V328" stroke="#ffffff" stroke-width="40"/>
    <path d="M418 178H742" stroke="#dadada" stroke-width="46"/>
    <path d="M418 178H742" stroke="#ffffff" stroke-width="38"/>
  </g>

  <!-- 방위 -->
  <g transform="translate(132 76)">
    <path d="M0 46L20 0L40 46L20 36Z" fill="#4d4d4d"/>
    <text x="20" y="78" text-anchor="middle" class="minor-label">N</text>
  </g>

  <!-- 기준점 -->
  <g>
    <rect x="430" y="100" width="360" height="158" rx="6" fill="#d9d9d9" stroke="#b4b4b4" stroke-width="3"/>
    <path d="M468 213V160H510V213M460 213H518M480 176H498M480 194H498" fill="none" stroke="#5b5b5b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="650" y="151" text-anchor="middle" class="place-name">진주시외</text>
    <text x="650" y="192" text-anchor="middle" class="place-name">버스터미널</text>
    <text x="650" y="230" text-anchor="middle" class="minor-label">호텔까지 약 400m</text>

    <text x="1040" y="302" text-anchor="middle" class="place-name" fill="#5a5a5a">선학산</text>
    <text x="1040" y="344" text-anchor="middle" class="minor-label" fill="#707070">서쪽 입구</text>
  </g>

  <!-- 도로명과 방면 -->
  <text x="260" y="382" text-anchor="middle" class="road-name">논개길</text>
  <text x="308" y="560" text-anchor="middle" class="road-name">남강로</text>
  <text x="150" y="622" class="minor-label">진주성 방면</text>

  <!-- 시외버스터미널에서 호텔 방향 -->
  <path d="M650 270C670 320 708 350 757 371C785 383 807 394 823 408" fill="none" stroke="#454545" stroke-width="8" stroke-dasharray="12 12" marker-end="url(#route-arrow)"/>

  <!-- 실제 상대 위치: 논개길 남측, 남강로 북측의 동쪽 끝 -->
  <g filter="url(#hotel-shadow)">
    <path d="M640 425C744 405 833 417 900 455L968 515C884 520 793 508 706 490L640 474Z" fill="#454545" stroke="#2e2e2e" stroke-width="5"/>
  </g>
  <g transform="translate(665 429)">
    <rect width="62" height="62" rx="31" fill="#ffffff" fill-opacity=".18" stroke="#ffffff" stroke-width="3"/>
    <text x="31" y="43" text-anchor="middle" font-size="35" font-weight="800" fill="#ffffff">H</text>
  </g>
  <text x="835" y="480" text-anchor="middle" class="hotel-name">호텔동방</text>

  <text x="650" y="716" text-anchor="middle" class="place-name" fill="#5f5f5f">남강</text>
</svg>
