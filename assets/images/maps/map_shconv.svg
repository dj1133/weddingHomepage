<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">선학컨벤션 약도</title>
  <desc id="desc">진주시 하대동 선학산 동쪽, 말티고개로에서 말티고개로100번길로 진입해 도착하는 선학컨벤션 위치 안내 약도</desc>
  <defs>
    <style>
      text {
        font-family: "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
        fill: #303438;
        letter-spacing: 0;
      }
      .road-label { font-size: 31px; font-weight: 700; fill: #596168; }
      .place-label { font-size: 32px; font-weight: 700; }
      .minor-label { font-size: 27px; font-weight: 600; fill: #697178; }
      .venue-label { font-size: 39px; font-weight: 800; fill: #2f3235; }
    </style>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#342b3a" flood-opacity=".22"/>
    </filter>
    <marker id="route-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#715f7d"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#f4f5f3"/>

  <!-- 선학산 지형 -->
  <path d="M0 0H668C636 109 655 217 611 320C566 427 481 493 451 612C421 727 449 823 416 900H0Z" fill="#dde7db"/>
  <path d="M40 166C169 115 301 145 388 224C469 298 518 360 532 452C547 557 479 655 408 728C334 804 207 815 78 768" fill="none" stroke="#b9cdb5" stroke-width="5" stroke-dasharray="12 14"/>
  <path d="M88 580C170 525 262 516 347 554C423 589 443 650 404 712C357 786 240 814 126 780" fill="none" stroke="#a9c1a6" stroke-width="6" stroke-dasharray="14 15"/>

  <!-- 하대동·초전동 건물군 -->
  <g fill="#e4e7e5" stroke="#ced3cf" stroke-width="2">
    <path d="M810 72H958V180H810Z"/>
    <path d="M982 62H1154V180H982Z"/>
    <path d="M786 220H920V330H786Z"/>
    <path d="M948 222H1082V330H948Z"/>
    <path d="M1106 218H1190V334H1106Z"/>
    <path d="M770 420H900V525H770Z"/>
    <path d="M928 414H1066V526H928Z"/>
    <path d="M1092 408H1190V526H1092Z"/>
    <path d="M736 610H882V724H736Z"/>
    <path d="M910 606H1052V724H910Z"/>
    <path d="M1082 600H1190V724H1082Z"/>
    <path d="M730 758H900V864H730Z"/>
    <path d="M930 756H1092V864H930Z"/>
  </g>

  <!-- 말티고개로와 주변 연결도로 -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1042 -30C1000 135 965 278 930 402C893 532 846 678 810 930" stroke="#c8cdca" stroke-width="44"/>
    <path d="M1042 -30C1000 135 965 278 930 402C893 532 846 678 810 930" stroke="#ffffff" stroke-width="34"/>

    <path d="M928 364C817 369 735 385 659 417C605 440 566 471 530 515" stroke="#d0d5d1" stroke-width="30"/>
    <path d="M928 364C817 369 735 385 659 417C605 440 566 471 530 515" stroke="#ffffff" stroke-width="22"/>

    <path d="M918 492C1020 486 1108 486 1210 500" stroke="#d5d9d6" stroke-width="24"/>
    <path d="M918 492C1020 486 1108 486 1210 500" stroke="#ffffff" stroke-width="16"/>
    <path d="M874 650C987 642 1086 646 1210 670" stroke="#d5d9d6" stroke-width="24"/>
    <path d="M874 650C987 642 1086 646 1210 670" stroke="#ffffff" stroke-width="16"/>
    <path d="M720 216C791 244 849 277 931 318" stroke="#d5d9d6" stroke-width="22"/>
    <path d="M720 216C791 244 849 277 931 318" stroke="#ffffff" stroke-width="14"/>
  </g>

  <!-- 기준점 -->
  <g>
    <circle cx="222" cy="686" r="62" fill="#cfddcb" stroke="#9eb99a" stroke-width="4"/>
    <path d="M183 711L221 646L260 711Z" fill="#6f8c6b"/>
    <text x="222" y="758" text-anchor="middle" class="place-label" fill="#526650">선학봉</text>

    <rect x="858" y="88" width="286" height="112" rx="5" fill="#dfe4e1" stroke="#bec5c0" stroke-width="3"/>
    <text x="1001" y="154" text-anchor="middle" class="place-label">금산초등학교</text>

    <text x="1080" y="792" text-anchor="middle" class="place-label" fill="#626a70">하대동</text>
    <text x="1090" y="250" text-anchor="middle" class="minor-label">초전동</text>
  </g>

  <!-- 도로명 -->
  <text x="1008" y="480" transform="rotate(104 1008 480)" text-anchor="middle" class="road-label">말티고개로</text>
  <text x="694" y="387" transform="rotate(-13 694 387)" text-anchor="middle" class="road-label">말티고개로100번길</text>

  <!-- 말티고개로에서 산 방향으로 진입 -->
  <path d="M917 345C824 351 744 366 674 396C620 419 584 446 551 483" fill="none" stroke="#715f7d" stroke-width="8" marker-end="url(#route-arrow)"/>

  <!-- 목적지: 100번길 서쪽 끝 -->
  <g filter="url(#pin-shadow)">
    <path d="M468 507C468 469 499 439 537 439C575 439 606 469 606 507C606 561 537 626 537 626C537 626 468 561 468 507Z" fill="#715f7d" stroke="#51435a" stroke-width="5"/>
    <circle cx="537" cy="506" r="23" fill="#ffffff"/>
  </g>
  <path d="M537 614V670H664" fill="none" stroke="#7b8186" stroke-width="3"/>
  <rect x="646" y="624" width="352" height="96" rx="5" fill="#ffffff" stroke="#aeb4b0" stroke-width="3"/>
  <text x="822" y="686" text-anchor="middle" class="venue-label">선학컨벤션</text>

  <!-- 방위 -->
  <g transform="translate(82 74)">
    <path d="M0 42L18 0L36 42L18 33Z" fill="#4c545a"/>
    <text x="18" y="73" text-anchor="middle" class="minor-label">N</text>
  </g>
</svg>
