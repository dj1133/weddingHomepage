    <circle cx="96" cy="948" r="6" fill="#d86755"/>
    <text x="116" y="956" font-size="21" font-weight="650">내비게이션에서 ‘선학컨벤션’을 검색해 주세요.</text>
    <text x="1518" y="956" text-anchor="end" font-size="16" font-weight="500" fill="#858c88">약도는 이해를 돕기 위해 단순화되었습니다.</text>
