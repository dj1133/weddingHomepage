    <circle cx="0" cy="-20" r="31" fill="#fffdfa"/>
    <circle cx="-10" cy="-20" r="13" fill="none" stroke="#d86755" stroke-width="5"/>
    <circle cx="10" cy="-20" r="13" fill="none" stroke="#d86755" stroke-width="5"/>
    <g transform="translate(92 -34)">
      <rect x="-8" y="-20" width="254" height="78" rx="8" fill="#26312f"/>
      <text class="venue-name" x="18" y="13" font-size="30" font-weight="800">선학컨벤션</text>
      <text class="venue-subtitle" x="18" y="42" font-size="16" font-weight="520">WEDDING &amp; CONVENTION</text>
