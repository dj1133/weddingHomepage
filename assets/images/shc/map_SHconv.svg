<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">선학컨벤션 오시는 길</title>
  <desc id="desc">말티고개로에서 말티고개로100번길로 진입해 선학컨벤션으로 이동하는 단순화 약도</desc>

  <defs>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#27312f" flood-opacity=".17"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 11 6 1 11Z" fill="#d86755"/>
    </marker>
    <path id="mainLabel" d="M80 230 C370 277 607 345 820 420 C1070 508 1300 545 1510 610"/>
    <style>
      text {
        font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
        fill: #26312f;
        letter-spacing: 0;
      }
      .road-edge {
        fill: none;
        stroke: #d3cdc2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .road {
        fill: none;
        stroke: #fffdfa;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .road-name {
        font-size: 21px;
        font-weight: 700;
        fill: #5d6662;
      }
      .landmark {
        font-size: 20px;
        font-weight: 680;
        fill: #394441;
      }
      .venue-name {
        fill: #fffdfa;
      }
      .venue-subtitle {
        fill: #d9dedb;
      }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#f6f2ea"/>

  <g aria-label="제목">
