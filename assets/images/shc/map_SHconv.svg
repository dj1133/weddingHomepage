    <text x="80" y="129" font-size="22" font-weight="520" fill="#747b77">경상남도 진주시 말티고개로100번길 16-9</text>
    <line x1="80" y1="158" x2="1520" y2="158" stroke="#d8d1c6" stroke-width="2"/>
  </g>

  <g aria-label="북쪽 방향" transform="translate(1462 62)">
